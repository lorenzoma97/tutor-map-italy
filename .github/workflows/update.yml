name: Aggiorna dati Tutor

on:
  schedule:
    - cron: '0 6 * * 1,5'  # Ogni lunedì e venerdì alle 6:00 UTC (8:00 italiane)
  workflow_dispatch:  # Permette esecuzione manuale
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui scraper
        run: python scraper.py

      - name: Correggi tracciati con geometria OSM
        run: python fix_coords.py

      - name: Genera KML
        run: python generate_kml.py

      - name: Commit e push se ci sono cambiamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tutor_segments.json tutor.kml
          if git diff --staged --quiet; then
            echo "Nessun cambiamento nei dati"
          else
            git commit -m "Aggiornamento automatico dati Tutor $(date +%Y-%m-%d)"
            git push
          fi

      - name: Deploy su GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
