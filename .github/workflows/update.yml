name: Aggiorna dati Tutor

on:
  schedule:
    - cron: '0 6 * * 1'  # Ogni lunedì alle 6:00 UTC
  workflow_dispatch:  # Permette esecuzione manuale

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui scraper
        run: python scraper.py

      - name: Correggi tracciati con geometria OSM
        run: python fix_coords.py

      - name: Genera KML
        run: python generate_kml.py

      - name: Commit e push se ci sono cambiamenti
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tutor_segments.json tutor.kml
          if git diff --staged --quiet; then
            echo "Nessun cambiamento nei dati"
          else
            git commit -m "Aggiornamento automatico dati Tutor $(date +%Y-%m-%d)"
            git push
          fi

      - name: Upload artefatti
        uses: actions/upload-artifact@v4
        with:
          name: tutor-data
          path: |
            tutor_segments.json
            tutor.kml
