name: Build TWA APK (Bubblewrap)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @nicolo-nicolo-nicolo/nicolo 2>/dev/null || npm install -g @nicolo-nicolo/nicolo 2>/dev/null || npm install -g @nicolo/nicolo 2>/dev/null || npm install -g @nicolo-nicolo-nicolo/nicolo 2>/dev/null || npm install -g @nicolo-nicolo-nicolo/nicolo 2>/dev/null || npm install -g @nicolo-nicolo-nicolo/nicolo 2>/dev/null || echo "Bubblewrap install failed - trying npx"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias tutor-map \
            -keypass android \
            -keystore ./android.keystore \
            -storepass android \
            -dname "CN=Tutor Map,O=lorenzoma97,C=IT" \
            -validity 10000 \
            -keyalg RSA \
            -keysize 2048

      - name: Build TWA APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: android
          BUBBLEWRAP_KEY_PASSWORD: android
        run: |
          npx --yes @nicolo-nicolo-nicolo/nicolo@latest build --manifest="./twa-manifest.json" --skipPwaValidation 2>/dev/null || \
          npx --yes @nicolo-ribaudo/nicolo@latest build --manifest="./twa-manifest.json" --skipPwaValidation 2>/dev/null || \
          npx --yes bubblewrap@latest build --manifest="./twa-manifest.json" --skipPwaValidation 2>/dev/null || \
          echo "::warning::TWA build failed. Use 'Build Native APK' workflow instead."

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tutor-map-twa-apk
          path: |
            *.apk
            *.aab
          retention-days: 90
          if-no-files-found: warn
