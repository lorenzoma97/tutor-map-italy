name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @nicolo-ribaudo/nicolo@latest 2>/dev/null || npm install -g @nicolo-ribaudo/nicolo@latest 2>/dev/null || npm install -g bubblewrap@latest 2>/dev/null || echo "Trying npx approach"

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -alias tutor-map \
            -keypass android \
            -keystore ./android.keystore \
            -storepass android \
            -dname "CN=Tutor Map,O=lorenzoma97,C=IT" \
            -validity 10000 \
            -keyalg RSA \
            -keysize 2048

      - name: Build TWA APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: android
          BUBBLEWRAP_KEY_PASSWORD: android
        run: |
          # Try bubblewrap directly, then via npx
          if command -v bubblewrap &>/dev/null; then
            bubblewrap build --manifest="./twa-manifest.json" --skipPwaValidation
          else
            npx --yes @nicolo-ribaudo/nicolo@latest build --manifest="./twa-manifest.json" --skipPwaValidation 2>/dev/null || \
            npx --yes bubblewrap@latest build --manifest="./twa-manifest.json" --skipPwaValidation
          fi

      - name: List output files
        if: always()
        run: ls -la *.apk *.aab 2>/dev/null || echo "No APK/AAB files found"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tutor-map-apk
          path: |
            *.apk
            *.aab
          retention-days: 90
          if-no-files-found: warn

      - name: Print signing fingerprint
        if: success()
        run: |
          keytool -list -v \
            -keystore ./android.keystore \
            -alias tutor-map \
            -storepass android \
            2>/dev/null | grep SHA256 || true
