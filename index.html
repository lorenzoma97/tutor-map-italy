<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a73e8">
    <meta name="color-scheme" content="light dark">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <title>Tutor Map Italia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #ffffff;
            --bg-card: #ffffff;
            --text: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --border: #e0e0e0;
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --surface: #f5f5f5;
            --shadow: rgba(0,0,0,0.15);
            --map-filter: none;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111111;
                --bg-card: #1e1e1e;
                --text: #e8e8e8;
                --text-secondary: #aaaaaa;
                --text-muted: #777777;
                --border: #333333;
                --primary: #5b9cf4;
                --primary-dark: #3d7dd9;
                --surface: #252525;
                --shadow: rgba(0,0,0,0.5);
                --map-filter: brightness(0.75) contrast(1.1) saturate(0.8);
            }
            .leaflet-tile-pane { filter: var(--map-filter); }
            .leaflet-control-zoom a {
                background: var(--bg-card) !important;
                color: var(--text) !important;
                border-color: var(--border) !important;
            }
            .leaflet-popup-content-wrapper, .leaflet-popup-tip {
                background: var(--bg-card) !important;
                color: var(--text) !important;
            }
            .leaflet-control-attribution {
                background: rgba(30,30,30,0.8) !important;
                color: var(--text-muted) !important;
            }
            .leaflet-control-attribution a { color: var(--text-secondary) !important; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
        }
        #map { width: 100%; height: 100vh; height: 100dvh; }

        /* ============ HUD — always visible during GPS ============ */
        #hud {
            display: none;
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 4px 20px var(--shadow);
            padding: 10px 20px;
            text-align: center;
            min-width: 200px;
            border: 2px solid var(--primary);
            transition: border-color 0.3s;
        }
        #hud.alert-approaching { border-color: #ff9800; }
        #hud.alert-inzone { border-color: #f44336; animation: hud-pulse 1.2s infinite; }
        #hud.alert-exited { border-color: #4caf50; }
        @keyframes hud-pulse {
            0%, 100% { box-shadow: 0 4px 20px var(--shadow); }
            50% { box-shadow: 0 4px 30px rgba(244,67,54,0.5); }
        }
        .hud-distance {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.1;
            color: var(--text);
        }
        .hud-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .hud-highway {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            margin-top: 2px;
        }

        /* ============ Alert Banner ============ */
        #alertBanner {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 12px;
            right: 12px;
            z-index: 2000;
            border-radius: 16px;
            padding: 16px 20px;
            font-weight: 700;
            font-size: 16px;
            text-align: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        #alertBanner.alert-start {
            background: linear-gradient(135deg, #ff6f00, #e65100);
        }
        #alertBanner.alert-end {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
        }
        #alertDismiss {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            opacity: 0.8;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ============ FAB — GPS toggle ============ */
        #fab {
            position: fixed;
            bottom: 24px;
            right: 16px;
            z-index: 1200;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s;
        }
        #fab:active { transform: scale(0.92); }
        #fab.active {
            background: #f44336;
            animation: fab-ring 2s infinite;
        }
        @keyframes fab-ring {
            0%, 100% { box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
            50% { box-shadow: 0 4px 16px rgba(0,0,0,0.3), 0 0 0 8px rgba(244,67,54,0.2); }
        }

        /* ============ Popup ============ */
        .popup-content {
            min-width: 200px;
        }
        .popup-bar {
            height: 4px;
            border-radius: 2px;
            margin-bottom: 8px;
        }
        .popup-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .popup-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        .popup-row:last-child { border-bottom: none; }
        .popup-label { color: var(--text-secondary); }
        .popup-value { font-weight: 600; color: var(--text); }
        .popup-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
        }
        .popup-badge.t30 { background: #fce4ec; color: #c62828; }
        .popup-badge.std { background: #e3f2fd; color: #1565c0; }
        .popup-source {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid var(--border);
        }

        /* ============ Driving mode: declutter ============ */
        body.driving .leaflet-control-zoom { display: none; }
        body.driving .leaflet-control-attribution { display: none; }

        /* ============ Active segment pulse ============ */
        @keyframes seg-pulse {
            0%, 100% { opacity: 0.85; }
            50% { opacity: 0.5; }
        }

        /* ============ Responsive ============ */
        @media (min-width: 768px) {
            #fab { bottom: 24px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- HUD — persistent during GPS -->
    <div id="hud">
        <div class="hud-distance" id="hudDistance">--</div>
        <div class="hud-label" id="hudLabel">Prossimo Tutor</div>
        <div class="hud-highway" id="hudHighway"></div>
    </div>

    <!-- Alert Banner -->
    <div id="alertBanner" class="alert-start" onclick="dismissAlert()">
        <span id="alertText"></span>
        <span id="alertDismiss">&times;</span>
    </div>

    <!-- FAB — GPS toggle -->
    <button id="fab" onclick="toggleCompass()" title="Attiva GPS">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/>
        </svg>
    </button>


    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ============ Config ============
        let map, allSegments = [], layers = [];
        let markerLayers = [];
        let metadata = null;
        let currentDirectionFilter = 'all'; // 'all', 'Nord', 'Sud', 'Est', 'Ovest', 'auto'
        let autoDetectedDirection = null;

        // ============ Map init ============
        map = L.map('map', {
            center: [42.5, 12.5],
            zoom: 6,
            zoomControl: false
        });
        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OSM | Dati: Autostrade per l\'Italia, Polizia di Stato',
            maxZoom: 18
        }).addTo(map);

        // ============ Data loading ============
        fetch('metadata.json')
            .then(r => r.ok ? r.json() : null)
            .then(meta => { metadata = meta; })
            .catch(() => {});

        fetch('tutor_segments.json')
            .then(r => r.json())
            .then(data => {
                allSegments = data;
                renderSegments(data);
            })
            .catch(err => console.error('Errore caricamento dati:', err));

        // ============ Filters ============
        // Filter state variables (controlled from Android native code via setter functions)
        let currentHighwayFilter = 'all';
        let currentTutor30Filter = false;

        function setHighwayFilter(value) {
            currentHighwayFilter = value;
            applyFilters();
        }

        function setTutor30Filter(value) {
            currentTutor30Filter = value;
            applyFilters();
        }

        function setDirectionFilter(dir) {
            currentDirectionFilter = dir;
            applyFilters();
        }

        // Called externally from Android native code
        function setDirectionFilterFromNative(dir) {
            setDirectionFilter(dir);
        }

        function getEffectiveDirection() {
            if (currentDirectionFilter === 'auto') return autoDetectedDirection;
            if (currentDirectionFilter === 'all') return null;
            return currentDirectionFilter;
        }

        function applyFilters() {
            const highway = currentHighwayFilter;
            const tutor30Only = currentTutor30Filter;
            const dir = getEffectiveDirection();

            let filtered = allSegments;
            if (highway !== 'all') filtered = filtered.filter(s => s.highway === highway);
            if (tutor30Only) filtered = filtered.filter(s => s.type === 'tutor_3.0');
            if (dir) filtered = filtered.filter(s => s.direction === dir);

            renderSegments(filtered);

            if ((highway !== 'all' || dir) && filtered.length > 0) {
                const bounds = L.latLngBounds(
                    filtered.flatMap(s => [s.start_coords, s.end_coords].filter(Boolean))
                );
                map.fitBounds(bounds, { padding: [30, 30] });
            }
        }

        function resetFilters() {
            currentHighwayFilter = 'all';
            currentTutor30Filter = false;
            setDirectionFilter('all');
            renderSegments(allSegments);
            map.setView([42.5, 12.5], 6);
        }

        // ============ Render segments ============
        function renderSegments(segments) {
            layers.forEach(l => map.removeLayer(l));
            layers = [];
            markerLayers.forEach(l => map.removeLayer(l));
            markerLayers = [];

            segments.forEach(seg => {
                if (!seg.start_coords || !seg.end_coords) return;

                const color = '#e53935';
                const isTutor30 = seg.type === 'tutor_3.0';

                const routeCoords = seg.route_coords || [seg.start_coords, seg.end_coords];
                const line = L.polyline(routeCoords, {
                    color: color,
                    weight: isTutor30 ? 7 : 5,
                    opacity: 0.9,
                }).addTo(map);

                // Popup — glanceable, max 3 righe principali
                const kmStr = (seg.start_km != null && seg.end_km != null)
                    ? `km ${seg.start_km.toLocaleString('it-IT')} → ${seg.end_km.toLocaleString('it-IT')} (${Math.abs(seg.end_km - seg.start_km).toFixed(1).replace('.', ',')} km)`
                    : '';
                const badge = isTutor30
                    ? '<span class="popup-badge t30">TUTOR 3.0</span>'
                    : '<span class="popup-badge std">Standard</span>';

                let sourceHtml = '';
                if (metadata && metadata.segment_sources) {
                    const key = `${seg.highway}|${seg.start_name}|${seg.end_name}`;
                    const src = metadata.segment_sources[key];
                    if (src) sourceHtml = `<div class="popup-source">${src.source} · ${src.date || '—'}</div>`;
                }

                line.bindPopup(`
                    <div class="popup-content">
                        <div class="popup-bar" style="background:${color}"></div>
                        <div class="popup-title">${seg.highway} · Dir. ${seg.direction}</div>
                        <div class="popup-row"><span class="popup-label">Tratto</span><span class="popup-value">${seg.start_name} → ${seg.end_name}</span></div>
                        ${kmStr ? `<div class="popup-row"><span class="popup-label">km</span><span class="popup-value">${kmStr}</span></div>` : ''}
                        <div class="popup-row"><span class="popup-label">Tipo</span>${badge}</div>
                        ${sourceHtml}
                    </div>
                `, { maxWidth: 300 });

                layers.push(line);

                // Invisible wider line for easier tapping
                const hitLine = L.polyline(routeCoords, {
                    color: 'transparent', weight: 24, opacity: 0
                }).addTo(map);
                hitLine.bindPopup(line.getPopup());
                layers.push(hitLine);

                // Marker inizio/fine
                [seg.start_coords, seg.end_coords].forEach((coords, idx) => {
                    const m = L.circleMarker(coords, {
                        radius: 5, fillColor: color, color: '#fff',
                        weight: 2, fillOpacity: 1
                    }).addTo(map);
                    const name = idx === 0 ? seg.start_name : seg.end_name;
                    const km = idx === 0 ? seg.start_km : seg.end_km;
                    const label = km != null ? `<b>${name}</b><br>km ${km}` : `<b>${name}</b>`;
                    m.bindTooltip(label, { direction: 'top', offset: [0, -5] });
                    markerLayers.push(m);
                });
            });

            updateMarkerVisibility();
        }

        // ============ Zoom-dependent marker visibility ============
        function updateMarkerVisibility() {
            const zoom = map.getZoom();
            const showMarkers = zoom >= 8;
            markerLayers.forEach(m => {
                if (showMarkers) { if (!map.hasLayer(m)) map.addLayer(m); }
                else { if (map.hasLayer(m)) map.removeLayer(m); }
            });
        }
        map.on('zoomend', updateMarkerVisibility);

        // ============ GPS / Direction Detection ============
        let compassActive = false;
        let watchId = null;
        let userMarker = null;
        const positionBuffer = []; // {lat, lng, time} — last N positions
        const POSITION_BUFFER_SIZE = 10;
        const MIN_TRAVEL_DISTANCE_M = 50; // min meters to consider bearing valid

        function calcBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const rlat1 = lat1 * Math.PI / 180, rlat2 = lat2 * Math.PI / 180;
            const x = Math.sin(dLon) * Math.cos(rlat2);
            const y = Math.cos(rlat1) * Math.sin(rlat2) -
                      Math.sin(rlat1) * Math.cos(rlat2) * Math.cos(dLon);
            return ((Math.atan2(x, y) * 180 / Math.PI) + 360) % 360;
        }

        function getUserBearing() {
            if (positionBuffer.length < 2) return null;
            const oldest = positionBuffer[0];
            const newest = positionBuffer[positionBuffer.length - 1];
            const dist = haversineDistance(oldest.lat, oldest.lng, newest.lat, newest.lng) * 1000;
            if (dist < MIN_TRAVEL_DISTANCE_M) return null; // fermo o quasi
            return calcBearing(oldest.lat, oldest.lng, newest.lat, newest.lng);
        }

        function getSegmentBearing(seg) {
            return calcBearing(seg.start_coords[0], seg.start_coords[1],
                             seg.end_coords[0], seg.end_coords[1]);
        }

        function bearingDiff(b1, b2) {
            let diff = Math.abs(b1 - b2) % 360;
            return diff > 180 ? 360 - diff : diff;
        }

        function isMatchingDirection(seg) {
            const userBearing = getUserBearing();
            if (userBearing === null) return true; // se non sappiamo, mostra (meglio falso positivo)
            if (!seg.end_coords) return true;
            const segBearing = getSegmentBearing(seg);
            return bearingDiff(userBearing, segBearing) < 60;
        }

        function headingToDirection(heading) {
            if (heading >= 315 || heading < 45) return 'Nord';
            if (heading >= 45 && heading < 135) return 'Est';
            if (heading >= 135 && heading < 225) return 'Sud';
            if (heading >= 225 && heading < 315) return 'Ovest';
            return null;
        }

        function toggleCompass() {
            compassActive ? stopCompass() : startCompass();
        }

        function startCompass() {
            if (!navigator.geolocation) { alert('GPS non supportato'); return; }

            const fab = document.getElementById('fab');
            fab.classList.add('active');
            compassActive = true;

            // Enter driving mode
            document.body.classList.add('driving');
            document.getElementById('hud').style.display = 'block';

            positionBuffer.length = 0; // reset buffer on start

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const { latitude, longitude } = pos.coords;

                    // Feed position buffer for direction detection
                    positionBuffer.push({ lat: latitude, lng: longitude, time: Date.now() });
                    if (positionBuffer.length > POSITION_BUFFER_SIZE) positionBuffer.shift();

                    if (userMarker) {
                        userMarker.setLatLng([latitude, longitude]);
                    } else {
                        userMarker = L.circleMarker([latitude, longitude], {
                            radius: 10, fillColor: '#4285f4', color: '#fff',
                            weight: 3, fillOpacity: 1
                        }).addTo(map).bindTooltip('Tu', { permanent: true, direction: 'top', offset: [0, -12],
                            className: 'user-tooltip' });
                        map.setView([latitude, longitude], 13);
                    }

                    // Auto-detect direction for filter
                    const bearing = getUserBearing();
                    if (bearing !== null) {
                        const detected = headingToDirection(bearing);
                        if (detected && detected !== autoDetectedDirection) {
                            autoDetectedDirection = detected;
                            if (currentDirectionFilter === 'auto') applyFilters();
                        }
                    }

                    checkProximity(latitude, longitude);
                    updateHUD(latitude, longitude);
                },
                (err) => console.error('GPS error:', err),
                { enableHighAccuracy: true, maximumAge: 5000 }
            );
        }

        function stopCompass() {
            if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
            if (userMarker) { map.removeLayer(userMarker); userMarker = null; }
            compassActive = false;
            alertedSegments.clear();
            activeSegments.clear();
            autoDetectedDirection = null;
            dismissAlert();
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();

            const fab = document.getElementById('fab');
            fab.classList.remove('active');

            // Exit driving mode
            document.body.classList.remove('driving');
            document.getElementById('hud').style.display = 'none';

            applyFilters();
        }

        // ============ HUD update ============
        function updateHUD(lat, lng) {
            const hud = document.getElementById('hud');
            let nearest = null, nearestDist = Infinity;

            for (const seg of allSegments) {
                if (!seg.start_coords) continue;
                if (!isMatchingDirection(seg)) continue; // solo direzione giusta
                const d = haversineDistance(lat, lng, seg.start_coords[0], seg.start_coords[1]);
                if (d < nearestDist) { nearestDist = d; nearest = seg; }
            }

            const distEl = document.getElementById('hudDistance');
            const labelEl = document.getElementById('hudLabel');
            const hwEl = document.getElementById('hudHighway');

            if (nearest && nearestDist < 100) {
                if (nearestDist < 1) {
                    distEl.textContent = `${Math.round(nearestDist * 1000)}m`;
                } else {
                    distEl.textContent = `${nearestDist.toFixed(1).replace('.', ',')}km`;
                }
                labelEl.textContent = `${nearest.start_name} → ${nearest.end_name}`;
                hwEl.textContent = `${nearest.highway} · Dir. ${nearest.direction}`;

                // HUD border color based on proximity
                hud.className = '';
                if (nearestDist < 0.8) hud.className = 'alert-inzone';
                else if (nearestDist < 2) hud.className = 'alert-approaching';
                else hud.className = '';
            } else {
                distEl.textContent = '--';
                labelEl.textContent = 'Nessun Tutor vicino';
                hwEl.textContent = '';
                hud.className = '';
            }
        }

        // ============ Text-to-Speech ============
        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utt = new SpeechSynthesisUtterance(text);
            utt.lang = 'it-IT';
            utt.rate = 0.95;
            utt.volume = 1;
            const voices = window.speechSynthesis.getVoices();
            const itVoice = voices.find(v => v.lang.startsWith('it'));
            if (itVoice) utt.voice = itVoice;
            window.speechSynthesis.speak(utt);
        }
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }

        // ============ Notifications ============
        let notificationsEnabled = false;
        if ('Notification' in window) {
            if (Notification.permission === 'granted') notificationsEnabled = true;
            else if (Notification.permission !== 'denied')
                Notification.requestPermission().then(p => { notificationsEnabled = p === 'granted'; });
        }

        // ============ Proximity alerts ============
        const ALERT_RADIUS_KM = 2;
        const END_RADIUS_KM = 0.8;
        const ALERT_COOLDOWN_MS = 5 * 60 * 1000; // 5 minuti cooldown per tratto
        let alertedSegments = new Map(); // segId -> timestamp (con scadenza)
        let activeSegments = new Map();
        let alertTimeout = null;

        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function checkProximity(lat, lng) {
            if (allSegments.length === 0) return; // dati non ancora caricati

            const now = Date.now();

            // 1. Fine tratti attivi
            for (const [segId, info] of activeSegments) {
                if (!info.seg.end_coords) continue;
                const distEnd = haversineDistance(lat, lng, info.seg.end_coords[0], info.seg.end_coords[1]);
                if (distEnd < END_RADIUS_KM) {
                    activeSegments.delete(segId);
                    showEndAlert(info.seg);
                }
                const distStart = haversineDistance(lat, lng, info.seg.start_coords[0], info.seg.start_coords[1]);
                if (distStart > 15 && distEnd > 15) activeSegments.delete(segId);
            }

            // 2. Inizio nuovi tratti (solo nella direzione giusta)
            for (const seg of allSegments) {
                if (!seg.start_coords) continue;
                const dist = haversineDistance(lat, lng, seg.start_coords[0], seg.start_coords[1]);
                const segId = `${seg.highway}-${seg.start_name}-${seg.end_name}-${seg.direction}`;
                const lastAlert = alertedSegments.get(segId);
                const cooldownOk = !lastAlert || (now - lastAlert > ALERT_COOLDOWN_MS);
                if (dist < ALERT_RADIUS_KM && cooldownOk && isMatchingDirection(seg)) {
                    alertedSegments.set(segId, now);
                    activeSegments.set(segId, { seg, enteredAt: now });
                    showProximityAlert(seg, dist);
                    break;
                }
            }
        }

        function showProximityAlert(seg, dist) {
            const tipo = seg.type === 'tutor_3.0' ? ' [3.0]' : '';
            const distStr = dist < 1 ? `${Math.round(dist * 1000)}m` : `${dist.toFixed(1).replace('.', ',')}km`;
            const msg = `TUTOR ${seg.highway}${tipo} tra ${distStr} — ${seg.start_name} → ${seg.end_name}`;

            const banner = document.getElementById('alertBanner');
            const text = document.getElementById('alertText');
            text.textContent = msg;
            banner.className = 'alert-start';
            banner.style.display = 'block';
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            clearTimeout(alertTimeout);
            alertTimeout = setTimeout(dismissAlert, 10000);

            // Voce: distanza, km, citta'
            const distVoce = dist < 1 ? `${Math.round(dist * 1000)} metri` : `${dist.toFixed(1)} chilometri`;
            const tipoVoce = seg.type === 'tutor_3.0' ? ', tutor 3.0' : '';
            const kmVoce = (seg.start_km != null && seg.end_km != null)
                ? `, dal chilometro ${Math.round(seg.start_km)} al chilometro ${Math.round(seg.end_km)}` : '';
            speak(`Attenzione, tutor ${seg.highway}${tipoVoce} tra ${distVoce}${kmVoce}`);

            if (notificationsEnabled) {
                try {
                    new Notification(`TUTOR tra ${distStr}`, {
                        body: `${seg.highway} ${seg.start_name} → ${seg.end_name} Dir.${seg.direction}${tipo}`,
                        icon: 'icons/icon-192x192.png', tag: 'tutor-alert', renotify: true
                    });
                } catch (_) {}
            }
        }

        function showEndAlert(seg) {
            const banner = document.getElementById('alertBanner');
            const text = document.getElementById('alertText');
            text.textContent = `Tratto ${seg.highway} ${seg.start_name} → ${seg.end_name} terminato`;
            banner.className = 'alert-end';
            banner.style.display = 'block';
            if (navigator.vibrate) navigator.vibrate([100]);
            clearTimeout(alertTimeout);
            alertTimeout = setTimeout(dismissAlert, 6000);
            speak(`Tratto tutor ${seg.highway} terminato`);
        }

        function dismissAlert() {
            document.getElementById('alertBanner').style.display = 'none';
            clearTimeout(alertTimeout);
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.error('SW failed:', err));
        }
    </script>
</body>
